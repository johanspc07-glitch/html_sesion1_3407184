<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .titulo {
            color: blue;
            font-size: 200%;
            text-align: center;
        }
        .menu {
            display: inline;
            color: black;
            background-color: lightgray;
            width: 1000px;
            height: 1000px
        }
        .menu_block {
            display: block;
            color: yellow;
            background-color: gray; 
            width: 400px;
            height: 200px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1 class="titulo" >Elementos inline</h1>
    <div class="menu">Productos</div>
    <div class="menu">Servicios</div>
    <div class="menu">Contacto</div>
    <hr>
    <h1>Elementos block</h1>
    <div class="menu_block">Productos</div>
    <div class="menu_block">Servicios</div>
    <div class="menu_block">Contacto</div>
</body>
</html>
